spring.application.name=inventoryservice
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=inventory
spring.data.mongodb.username=admin
spring.data.mongodb.password=password
spring.data.mongodb.uri=mongodb://localhost:27017/inventory
spring.data.mongodb.auto-index-creation=true
server.port=8080

# Disable cloud config to prevent restart loops
spring.cloud.config.enabled=false
# Feign client configuration
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000

spring.kafka.bootstrap-servers=localhost:9092

# Kafka Consumer
spring.kafka.consumer.group-id=inventory-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.practice.inventoryservice.model.ProductEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false
#spring.kafka.listener.ack-mode=manual_immediate

